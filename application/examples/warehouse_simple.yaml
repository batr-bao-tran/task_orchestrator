# Simple warehouse: 2 robots, 3 tasks
id: warehouse_simple
actors:
  - id: robot_1
    type: robot
    capacity: 2
    windows:
      - start: 0
        end: 1000
  - id: robot_2
    type: robot
    capacity: 1
    windows:
      - start: 0
        end: 1000
tasks:
  - id: order_1
    requested_time: 0
    duration: 30
    deadline: 100
    allowed_actor_types: [robot]
  - id: order_2
    requested_time: 10
    duration: 20
    deadline: 80
    allowed_actor_types: [robot]
  - id: order_3
    requested_time: 5
    duration: 25
    deadline: 90
    allowed_actor_types: [robot]
