id: warehouse_simple
optimization:
  backend: indexed_exact
  time_limit_ms: 250
  relative_gap_limit: 0.05
  num_search_workers: 1
  allow_partial_plan: true
  objective:
    fulfilled_task_weight: 100
    priority_weight: 10
    makespan_weight: 2
    travel_distance_weight: 3
    tardiness_weight: 8
    execution_cost_weight: 1
    preferred_actor_weight: 6
actors:
  - id: robot_1
    type: robot
    capacity: 2
    capabilities: [lift, scan]
    execution_cost_per_unit: 1.0
    windows:
      - start: 0
        end: 1000
  - id: robot_2
    type: robot
    capacity: 1
    capabilities: [lift, pack]
    execution_cost_per_unit: 1.4
    windows:
      - start: 0
        end: 1000
tasks:
  - id: order_1_pick
    requested_time: 0
    duration: 20
    latest_start_time: 5
    deadline: 60
    priority: 10
    demand: 1
    mandatory: true
    preemptible: false
    allowed_actor_types: [robot]
    preferred_actor_ids: [robot_1]
    required_capabilities: [lift]
    actor_distances:
      robot_1: 1
      robot_2: 4
    tardiness_cost_per_unit: 2.0
    early_start_bonus: 0.5
    phase_durations: [8, 12]
  - id: order_2_scan
    requested_time: 5
    duration: 15
    latest_start_time: 30
    deadline: 70
    priority: 8
    demand: 1
    mandatory: true
    preemptible: false
    allowed_actor_ids: [robot_1]
    required_capabilities: [scan]
    dependency_task_ids: [order_1_pick]
    actor_distances:
      robot_1: 1
    tardiness_cost_per_unit: 1.5
    early_start_bonus: 0.3
  - id: order_3_pack
    requested_time: 10
    duration: 18
    latest_start_time: 60
    deadline: 90
    priority: 7
    demand: 1
    mandatory: true
    preemptible: false
    allowed_actor_types: [robot]
    preferred_actor_ids: [robot_2]
    required_capabilities: [pack]
    dependency_task_ids: [order_2_scan]
    actor_distances:
      robot_1: 6
      robot_2: 2
    tardiness_cost_per_unit: 1.0
    early_start_bonus: 0.2
