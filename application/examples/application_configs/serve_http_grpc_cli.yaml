application:
  mode: serve
  service:
    security:
      mode: api_key
      expected_credential: local-dev-key
      require_secure_transport: false
    control_plane:
      enabled: true
      database_path: .task-orchestrator/control-plane/control_plane.sqlite3
      recover_on_start: true
      prune_after_days: 30
    bootstrap_request:
      kind: workflow_yaml
      path: ../workflow_configs/service_bootstrap_rich.yaml
    interfaces:
      cli:
        enabled: true
        prompt: "planner> "
      http:
        enabled: true
        bind_address: 127.0.0.1
        port: 8080
        io_threads: 4
        max_body_bytes: 2097152
      grpc:
        enabled: true
        bind_address: 127.0.0.1
        port: 0
        completion_queue_threads: 4
        max_receive_message_bytes: 2097152
        max_send_message_bytes: 2097152
