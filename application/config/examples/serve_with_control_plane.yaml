application:
  mode: serve
  service:
    security:
      mode: api_key
      expected_credential: local-dev-key
      require_secure_transport: false
    control_plane:
      enabled: true
      database_path: .task-orchestrator/control-plane/control_plane.sqlite3
      recover_on_start: true
      prune_after_days: 30
    interfaces:
      cli:
        enabled: true
        prompt: "planner> "
      http:
        enabled: true
        bind_address: 127.0.0.1
        port: 8080
      grpc:
        enabled: true
        bind_address: 127.0.0.1
        port: 9090
