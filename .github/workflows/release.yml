# Release: build, test, and package installable tarballs (Linux amd64, macOS)
# Trigger: publish a release (tag v*) or run workflow_dispatch
name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

env:
  BAZEL_VERSION: "8.5.0"
  BAZEL_CACHE_VERSION: "v1"

jobs:
  package:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            platform: linux_amd64
          - os: macos-15
            platform: macos_arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install lld (Linux)
        if: matrix.os == 'ubuntu-24.04'
        run: sudo apt-get update && sudo apt-get install -y lld

      - name: Set up Xcode (macOS)
        if: matrix.os == 'macos-15'
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Compute Bazel cache settings
        id: bazel-cache
        run: |
          {
            echo "disk_cache_dir=${RUNNER_TEMP}/bazel-disk-cache/${{ matrix.os }}"
            echo "disk_cache_key=bazel-disk-${{ env.BAZEL_CACHE_VERSION }}-${{ matrix.os }}-default-${{ hashFiles('.bazelversion', '.bazelrc', 'MODULE.bazel', 'MODULE.bazel.lock') }}-${{ github.sha }}"
            echo "disk_restore_key=bazel-disk-${{ env.BAZEL_CACHE_VERSION }}-${{ matrix.os }}-default-${{ hashFiles('.bazelversion', '.bazelrc', 'MODULE.bazel', 'MODULE.bazel.lock') }}-"
            echo "repository_cache_dir=${RUNNER_TEMP}/bazel-repository-cache/${{ matrix.os }}"
            echo "repository_cache_key=bazel-repository-${{ env.BAZEL_CACHE_VERSION }}-${{ matrix.os }}-${{ hashFiles('.bazelversion', 'MODULE.bazel', 'MODULE.bazel.lock') }}-${{ github.sha }}"
            echo "repository_restore_key=bazel-repository-${{ env.BAZEL_CACHE_VERSION }}-${{ matrix.os }}-${{ hashFiles('.bazelversion', 'MODULE.bazel', 'MODULE.bazel.lock') }}-"
          } >> "${GITHUB_OUTPUT}"

      - name: Set up Bazel
        uses: bazel-contrib/setup-bazel@0.8.0
        with:
          bazel_version: ${{ env.BAZEL_VERSION }}

      - name: Restore Bazel disk cache
        id: restore-disk-cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ steps.bazel-cache.outputs.disk_cache_dir }}
          key: ${{ steps.bazel-cache.outputs.disk_cache_key }}
          restore-keys: |
            ${{ steps.bazel-cache.outputs.disk_restore_key }}

      - name: Restore Bazel repository cache
        id: restore-repository-cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ steps.bazel-cache.outputs.repository_cache_dir }}
          key: ${{ steps.bazel-cache.outputs.repository_cache_key }}
          restore-keys: |
            ${{ steps.bazel-cache.outputs.repository_restore_key }}

      - name: Build
        env:
          BAZEL_CI_DISK_CACHE_DIR: ${{ steps.bazel-cache.outputs.disk_cache_dir }}
          BAZEL_CI_REPOSITORY_CACHE_DIR: ${{ steps.bazel-cache.outputs.repository_cache_dir }}
        run: |
          if [ "${{ matrix.os }}" = "ubuntu-24.04" ]; then
            tools/ci/bazel_ci.sh build --config=linux //task_orchestrator:task_orchestrator
          else
            tools/ci/bazel_ci.sh build --config=darwin //task_orchestrator:task_orchestrator
          fi

      - name: Test
        env:
          BAZEL_CI_DISK_CACHE_DIR: ${{ steps.bazel-cache.outputs.disk_cache_dir }}
          BAZEL_CI_REPOSITORY_CACHE_DIR: ${{ steps.bazel-cache.outputs.repository_cache_dir }}
        run: |
          if [ "${{ matrix.os }}" = "ubuntu-24.04" ]; then
            tools/ci/bazel_ci.sh test --config=linux //... --test_output=errors
          else
            tools/ci/bazel_ci.sh test --config=darwin //... --test_output=errors
          fi

      - name: Prepare package
        id: pkg
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          [[ "$VERSION" == "" || "$VERSION" == "$GITHUB_REF_NAME" ]] && VERSION="0.0.0-dev"
          PKGDIR="task_orchestrator-${VERSION}-${{ matrix.platform }}"
          mkdir -p "$PKGDIR/include" "$PKGDIR/lib"
          cp -r task_orchestrator/include/task_orchestrator "$PKGDIR/include/"
          LIBDIR=$(find bazel-bin/task_orchestrator -maxdepth 1 -type f \( -name '*.a' -o -name '*.so' -o -name '*.dylib' \) 2>/dev/null | head -1)
          if [ -n "$LIBDIR" ]; then
            cp "$LIBDIR" "$PKGDIR/lib/"
          fi
          tar czf "${PKGDIR}.tar.gz" "$PKGDIR"
          echo "package=${PKGDIR}.tar.gz" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Save Bazel disk cache
        if: steps.restore-disk-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ steps.bazel-cache.outputs.disk_cache_dir }}
          key: ${{ steps.bazel-cache.outputs.disk_cache_key }}

      - name: Save Bazel repository cache
        if: steps.restore-repository-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ steps.bazel-cache.outputs.repository_cache_dir }}
          key: ${{ steps.bazel-cache.outputs.repository_cache_key }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: task_orchestrator-${{ matrix.platform }}
          path: ${{ steps.pkg.outputs.package }}

  # Upload release assets when triggered by release published
  upload-release-assets:
    needs: package
    if: github.event_name == 'release'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/**/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
