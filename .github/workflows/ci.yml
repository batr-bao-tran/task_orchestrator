name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BAZEL_VERSION: "8.5.0"
  BAZEL_CACHE_VERSION: "v1"

jobs:
  linux-build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install lld
        run: sudo apt-get update && sudo apt-get install -y lld

      - name: Compute Bazel cache settings
        id: bazel-cache
        run: |
          {
            echo "disk_cache_dir=${RUNNER_TEMP}/bazel-disk-cache/${{ matrix.os }}"
            echo "disk_cache_key=bazel-disk-${{ env.BAZEL_CACHE_VERSION }}-${{ matrix.os }}-default-${{ hashFiles('.bazelversion', '.bazelrc', 'MODULE.bazel', 'MODULE.bazel.lock') }}-${{ github.sha }}"
            echo "disk_restore_key=bazel-disk-${{ env.BAZEL_CACHE_VERSION }}-${{ matrix.os }}-default-${{ hashFiles('.bazelversion', '.bazelrc', 'MODULE.bazel', 'MODULE.bazel.lock') }}-"
            echo "repository_cache_dir=${RUNNER_TEMP}/bazel-repository-cache/${{ matrix.os }}"
            echo "repository_cache_key=bazel-repository-${{ env.BAZEL_CACHE_VERSION }}-${{ matrix.os }}-${{ hashFiles('.bazelversion', 'MODULE.bazel', 'MODULE.bazel.lock') }}-${{ github.sha }}"
            echo "repository_restore_key=bazel-repository-${{ env.BAZEL_CACHE_VERSION }}-${{ matrix.os }}-${{ hashFiles('.bazelversion', 'MODULE.bazel', 'MODULE.bazel.lock') }}-"
          } >> "${GITHUB_OUTPUT}"

      - name: Set up Bazel
        uses: bazel-contrib/setup-bazel@0.8.0
        with:
          bazel_version: ${{ env.BAZEL_VERSION }}

      - name: Restore Bazel disk cache
        id: restore-disk-cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ steps.bazel-cache.outputs.disk_cache_dir }}
          key: ${{ steps.bazel-cache.outputs.disk_cache_key }}
          restore-keys: |
            ${{ steps.bazel-cache.outputs.disk_restore_key }}

      - name: Restore Bazel repository cache
        id: restore-repository-cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ steps.bazel-cache.outputs.repository_cache_dir }}
          key: ${{ steps.bazel-cache.outputs.repository_cache_key }}
          restore-keys: |
            ${{ steps.bazel-cache.outputs.repository_restore_key }}

      - name: Build
        env:
          BAZEL_CI_DISK_CACHE_DIR: ${{ steps.bazel-cache.outputs.disk_cache_dir }}
          BAZEL_CI_REPOSITORY_CACHE_DIR: ${{ steps.bazel-cache.outputs.repository_cache_dir }}
        run: tools/ci/bazel_ci.sh build --config=linux //...

      - name: Pack Bazel disk cache for downstream jobs
        run: |
          mkdir -p "${{ steps.bazel-cache.outputs.disk_cache_dir }}"
          tar -cf "${RUNNER_TEMP}/bazel-disk-cache-${{ matrix.os }}.tar" \
            -C "${{ steps.bazel-cache.outputs.disk_cache_dir }}" \
            .

      - name: Upload Bazel disk cache artifact
        uses: actions/upload-artifact@v4
        with:
          name: bazel-disk-cache-${{ matrix.os }}-${{ github.sha }}
          path: ${{ runner.temp }}/bazel-disk-cache-${{ matrix.os }}.tar
          retention-days: 1
          compression-level: 0

      - name: Pack Bazel repository cache for downstream jobs
        run: |
          mkdir -p "${{ steps.bazel-cache.outputs.repository_cache_dir }}"
          tar -cf "${RUNNER_TEMP}/bazel-repository-cache-${{ matrix.os }}.tar" \
            -C "${{ steps.bazel-cache.outputs.repository_cache_dir }}" \
            .

      - name: Upload Bazel repository cache artifact
        uses: actions/upload-artifact@v4
        with:
          name: bazel-repository-cache-${{ matrix.os }}-${{ github.sha }}
          path: ${{ runner.temp }}/bazel-repository-cache-${{ matrix.os }}.tar
          retention-days: 1
          compression-level: 0

      - name: Save Bazel disk cache
        if: steps.restore-disk-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ steps.bazel-cache.outputs.disk_cache_dir }}
          key: ${{ steps.bazel-cache.outputs.disk_cache_key }}

      - name: Save Bazel repository cache
        if: steps.restore-repository-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ steps.bazel-cache.outputs.repository_cache_dir }}
          key: ${{ steps.bazel-cache.outputs.repository_cache_key }}

  frontend-quality:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: operator_ui/package-lock.json

      - name: Install frontend dependencies
        working-directory: operator_ui
        run: npm ci

      - name: Run frontend lint
        working-directory: operator_ui
        run: npm run lint

      - name: Run frontend unit tests
        working-directory: operator_ui
        run: npm run test

      - name: Build frontend
        working-directory: operator_ui
        run: npm run build

  linux-test:
    needs: linux-build
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install lld
        run: sudo apt-get update && sudo apt-get install -y lld

      - name: Compute Bazel cache settings
        id: bazel-cache
        run: |
          {
            echo "disk_cache_dir=${RUNNER_TEMP}/bazel-disk-cache/${{ matrix.os }}"
            echo "repository_cache_dir=${RUNNER_TEMP}/bazel-repository-cache/${{ matrix.os }}"
          } >> "${GITHUB_OUTPUT}"

      - name: Set up Bazel
        uses: bazel-contrib/setup-bazel@0.8.0
        with:
          bazel_version: ${{ env.BAZEL_VERSION }}

      - name: Download Bazel disk cache artifact
        uses: actions/download-artifact@v4
        with:
          name: bazel-disk-cache-${{ matrix.os }}-${{ github.sha }}
          path: ${{ runner.temp }}

      - name: Restore build job Bazel disk cache
        run: |
          rm -rf "${{ steps.bazel-cache.outputs.disk_cache_dir }}"
          mkdir -p "${{ steps.bazel-cache.outputs.disk_cache_dir }}"
          tar -xf "${RUNNER_TEMP}/bazel-disk-cache-${{ matrix.os }}.tar" \
            -C "${{ steps.bazel-cache.outputs.disk_cache_dir }}"

      - name: Download Bazel repository cache artifact
        uses: actions/download-artifact@v4
        with:
          name: bazel-repository-cache-${{ matrix.os }}-${{ github.sha }}
          path: ${{ runner.temp }}

      - name: Restore build job Bazel repository cache
        run: |
          rm -rf "${{ steps.bazel-cache.outputs.repository_cache_dir }}"
          mkdir -p "${{ steps.bazel-cache.outputs.repository_cache_dir }}"
          tar -xf "${RUNNER_TEMP}/bazel-repository-cache-${{ matrix.os }}.tar" \
            -C "${{ steps.bazel-cache.outputs.repository_cache_dir }}"

      - name: Test
        env:
          BAZEL_CI_DISK_CACHE_DIR: ${{ steps.bazel-cache.outputs.disk_cache_dir }}
          BAZEL_CI_REPOSITORY_CACHE_DIR: ${{ steps.bazel-cache.outputs.repository_cache_dir }}
        run: tools/ci/bazel_ci.sh test --config=linux //... --test_output=errors

  macos-smoke:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Compute Bazel cache settings
        id: bazel-cache
        run: |
          {
            echo "disk_cache_dir=${RUNNER_TEMP}/bazel-disk-cache/macos-15"
            echo "disk_cache_key=bazel-disk-${{ env.BAZEL_CACHE_VERSION }}-macos-15-default-${{ hashFiles('.bazelversion', '.bazelrc', 'MODULE.bazel', 'MODULE.bazel.lock') }}-${{ github.sha }}"
            echo "disk_restore_key=bazel-disk-${{ env.BAZEL_CACHE_VERSION }}-macos-15-default-${{ hashFiles('.bazelversion', '.bazelrc', 'MODULE.bazel', 'MODULE.bazel.lock') }}-"
            echo "repository_cache_dir=${RUNNER_TEMP}/bazel-repository-cache/macos-15"
            echo "repository_cache_key=bazel-repository-${{ env.BAZEL_CACHE_VERSION }}-macos-15-${{ hashFiles('.bazelversion', 'MODULE.bazel', 'MODULE.bazel.lock') }}-${{ github.sha }}"
            echo "repository_restore_key=bazel-repository-${{ env.BAZEL_CACHE_VERSION }}-macos-15-${{ hashFiles('.bazelversion', 'MODULE.bazel', 'MODULE.bazel.lock') }}-"
          } >> "${GITHUB_OUTPUT}"

      - name: Set up Bazel
        uses: bazel-contrib/setup-bazel@0.8.0
        with:
          bazel_version: ${{ env.BAZEL_VERSION }}

      - name: Restore Bazel disk cache
        id: restore-disk-cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ steps.bazel-cache.outputs.disk_cache_dir }}
          key: ${{ steps.bazel-cache.outputs.disk_cache_key }}
          restore-keys: |
            ${{ steps.bazel-cache.outputs.disk_restore_key }}

      - name: Restore Bazel repository cache
        id: restore-repository-cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ steps.bazel-cache.outputs.repository_cache_dir }}
          key: ${{ steps.bazel-cache.outputs.repository_cache_key }}
          restore-keys: |
            ${{ steps.bazel-cache.outputs.repository_restore_key }}

      - name: Build macOS smoke targets
        env:
          BAZEL_CI_DISK_CACHE_DIR: ${{ steps.bazel-cache.outputs.disk_cache_dir }}
          BAZEL_CI_REPOSITORY_CACHE_DIR: ${{ steps.bazel-cache.outputs.repository_cache_dir }}
        run: |
          tools/ci/bazel_ci.sh build --config=darwin \
            //application:run_config \
            //protocol:http_transport \
            //protocol:grpc_transport \
            //task_orchestrator:task_orchestrator

      - name: Run macOS smoke tests
        env:
          BAZEL_CI_DISK_CACHE_DIR: ${{ steps.bazel-cache.outputs.disk_cache_dir }}
          BAZEL_CI_REPOSITORY_CACHE_DIR: ${{ steps.bazel-cache.outputs.repository_cache_dir }}
        run: |
          tools/ci/bazel_ci.sh test --config=darwin \
            //application/tests:config_loader_test \
            //application/tests:application_test \
            //task_orchestrator/tests/unit:optimizer_test \
            --test_output=errors

      - name: Save Bazel disk cache
        if: steps.restore-disk-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ steps.bazel-cache.outputs.disk_cache_dir }}
          key: ${{ steps.bazel-cache.outputs.disk_cache_key }}

      - name: Save Bazel repository cache
        if: steps.restore-repository-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ steps.bazel-cache.outputs.repository_cache_dir }}
          key: ${{ steps.bazel-cache.outputs.repository_cache_key }}

  lint:
    needs: linux-build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install lint tools
        run: tools/ci/install_llvm_22.sh

      - name: Compute Bazel cache settings
        id: bazel-cache
        run: |
          {
            echo "disk_cache_dir=${RUNNER_TEMP}/bazel-disk-cache/ubuntu-24.04"
            echo "repository_cache_dir=${RUNNER_TEMP}/bazel-repository-cache/ubuntu-24.04"
          } >> "${GITHUB_OUTPUT}"

      - name: Set up Bazel
        uses: bazel-contrib/setup-bazel@0.8.0
        with:
          bazel_version: ${{ env.BAZEL_VERSION }}

      - name: Download Bazel disk cache artifact
        uses: actions/download-artifact@v4
        with:
          name: bazel-disk-cache-ubuntu-24.04-${{ github.sha }}
          path: ${{ runner.temp }}

      - name: Restore build job Bazel disk cache
        run: |
          rm -rf "${{ steps.bazel-cache.outputs.disk_cache_dir }}"
          mkdir -p "${{ steps.bazel-cache.outputs.disk_cache_dir }}"
          tar -xf "${RUNNER_TEMP}/bazel-disk-cache-ubuntu-24.04.tar" \
            -C "${{ steps.bazel-cache.outputs.disk_cache_dir }}"

      - name: Download Bazel repository cache artifact
        uses: actions/download-artifact@v4
        with:
          name: bazel-repository-cache-ubuntu-24.04-${{ github.sha }}
          path: ${{ runner.temp }}

      - name: Restore build job Bazel repository cache
        run: |
          rm -rf "${{ steps.bazel-cache.outputs.repository_cache_dir }}"
          mkdir -p "${{ steps.bazel-cache.outputs.repository_cache_dir }}"
          tar -xf "${RUNNER_TEMP}/bazel-repository-cache-ubuntu-24.04.tar" \
            -C "${{ steps.bazel-cache.outputs.repository_cache_dir }}"

      - name: Build compile database inputs
        env:
          BAZEL_CI_DISK_CACHE_DIR: ${{ steps.bazel-cache.outputs.disk_cache_dir }}
          BAZEL_CI_REPOSITORY_CACHE_DIR: ${{ steps.bazel-cache.outputs.repository_cache_dir }}
        run: tools/ci/bazel_ci.sh build --config=linux //...

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Run lint
        run: pre-commit run --all-files

  sanitize:
    needs: linux-build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install clang and lld
        run: tools/ci/install_llvm_22.sh

      - name: Compute Bazel cache settings
        id: bazel-cache
        run: |
          {
            echo "disk_cache_dir=${RUNNER_TEMP}/bazel-disk-cache/ubuntu-24.04-sanitize"
            echo "disk_cache_key=bazel-disk-${{ env.BAZEL_CACHE_VERSION }}-ubuntu-24.04-sanitize-${{ hashFiles('.bazelversion', '.bazelrc', 'MODULE.bazel', 'MODULE.bazel.lock') }}-${{ github.sha }}"
            echo "disk_restore_key=bazel-disk-${{ env.BAZEL_CACHE_VERSION }}-ubuntu-24.04-sanitize-${{ hashFiles('.bazelversion', '.bazelrc', 'MODULE.bazel', 'MODULE.bazel.lock') }}-"
            echo "repository_cache_dir=${RUNNER_TEMP}/bazel-repository-cache/ubuntu-24.04"
          } >> "${GITHUB_OUTPUT}"

      - name: Set up Bazel
        uses: bazel-contrib/setup-bazel@0.8.0
        with:
          bazel_version: ${{ env.BAZEL_VERSION }}

      - name: Restore Bazel disk cache
        id: restore-disk-cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ steps.bazel-cache.outputs.disk_cache_dir }}
          key: ${{ steps.bazel-cache.outputs.disk_cache_key }}
          restore-keys: |
            ${{ steps.bazel-cache.outputs.disk_restore_key }}

      - name: Download Bazel repository cache artifact
        uses: actions/download-artifact@v4
        with:
          name: bazel-repository-cache-ubuntu-24.04-${{ github.sha }}
          path: ${{ runner.temp }}

      - name: Restore build job Bazel repository cache
        run: |
          rm -rf "${{ steps.bazel-cache.outputs.repository_cache_dir }}"
          mkdir -p "${{ steps.bazel-cache.outputs.repository_cache_dir }}"
          tar -xf "${RUNNER_TEMP}/bazel-repository-cache-ubuntu-24.04.tar" \
            -C "${{ steps.bazel-cache.outputs.repository_cache_dir }}"

      - name: Run sanitizer suite
        env:
          BAZEL_CI_DISK_CACHE_DIR: ${{ steps.bazel-cache.outputs.disk_cache_dir }}
          BAZEL_CI_REPOSITORY_CACHE_DIR: ${{ steps.bazel-cache.outputs.repository_cache_dir }}
        run: tools/testing/run_sanitizers.sh

      - name: Save Bazel disk cache
        if: steps.restore-disk-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ steps.bazel-cache.outputs.disk_cache_dir }}
          key: ${{ steps.bazel-cache.outputs.disk_cache_key }}

  coverage:
    needs: linux-build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install lld
        run: sudo apt-get update && sudo apt-get install -y lld

      - name: Compute Bazel cache settings
        id: bazel-cache
        run: |
          {
            echo "disk_cache_dir=${RUNNER_TEMP}/bazel-disk-cache/ubuntu-24.04-coverage"
            echo "disk_cache_key=bazel-disk-${{ env.BAZEL_CACHE_VERSION }}-ubuntu-24.04-coverage-${{ hashFiles('.bazelversion', '.bazelrc', 'MODULE.bazel', 'MODULE.bazel.lock') }}-${{ github.sha }}"
            echo "disk_restore_key=bazel-disk-${{ env.BAZEL_CACHE_VERSION }}-ubuntu-24.04-coverage-${{ hashFiles('.bazelversion', '.bazelrc', 'MODULE.bazel', 'MODULE.bazel.lock') }}-"
            echo "repository_cache_dir=${RUNNER_TEMP}/bazel-repository-cache/ubuntu-24.04"
          } >> "${GITHUB_OUTPUT}"

      - name: Set up Bazel
        uses: bazel-contrib/setup-bazel@0.8.0
        with:
          bazel_version: ${{ env.BAZEL_VERSION }}

      - name: Restore Bazel disk cache
        id: restore-disk-cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ steps.bazel-cache.outputs.disk_cache_dir }}
          key: ${{ steps.bazel-cache.outputs.disk_cache_key }}
          restore-keys: |
            ${{ steps.bazel-cache.outputs.disk_restore_key }}

      - name: Download Bazel repository cache artifact
        uses: actions/download-artifact@v4
        with:
          name: bazel-repository-cache-ubuntu-24.04-${{ github.sha }}
          path: ${{ runner.temp }}

      - name: Restore build job Bazel repository cache
        run: |
          rm -rf "${{ steps.bazel-cache.outputs.repository_cache_dir }}"
          mkdir -p "${{ steps.bazel-cache.outputs.repository_cache_dir }}"
          tar -xf "${RUNNER_TEMP}/bazel-repository-cache-ubuntu-24.04.tar" \
            -C "${{ steps.bazel-cache.outputs.repository_cache_dir }}"

      - name: Run coverage
        env:
          BAZEL_CI_DISK_CACHE_DIR: ${{ steps.bazel-cache.outputs.disk_cache_dir }}
          BAZEL_CI_REPOSITORY_CACHE_DIR: ${{ steps.bazel-cache.outputs.repository_cache_dir }}
        run: tools/testing/check_coverage.sh 90

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: operator_ui/package-lock.json

      - name: Install frontend dependencies
        working-directory: operator_ui
        run: npm ci

      - name: Run frontend coverage
        working-directory: operator_ui
        run: npm run test:coverage:ci

      - name: Save Bazel disk cache
        if: steps.restore-disk-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ steps.bazel-cache.outputs.disk_cache_dir }}
          key: ${{ steps.bazel-cache.outputs.disk_cache_key }}

      - name: Export coverage report
        run: cp "$(bazel info output_path)/_coverage/_coverage_report.dat" coverage-report.lcov

      - name: Upload backend coverage report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-report-lcov
          path: coverage-report.lcov

      - name: Upload frontend coverage report
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage-report-lcov
          path: operator_ui/coverage/lcov.info
